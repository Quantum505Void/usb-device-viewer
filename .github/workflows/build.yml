name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            desktop-file-utils

      - name: Install native deps (macOS)
        if: runner.os == 'macOS'
        run: |
          # node-hid 在 macOS 使用系统 IOKit 框架，无需安装 hidapi
          brew install create-dmg

      # Windows: node-hid 使用预编译 .node，无需额外依赖

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # ── Linux: AppImage ────────────────────────────────────────────────────
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_DIR=$(find build -mindepth 2 -maxdepth 2 -type d | head -1)
          echo "Using build dir: $BUILD_DIR"

          APP_DIR="USBDeviceViewer.AppDir"
          mkdir -p "$APP_DIR/usr/bin" "$APP_DIR/usr/lib" \
                   "$APP_DIR/usr/share/applications" \
                   "$APP_DIR/usr/share/icons/hicolor/256x256/apps"

          # 复制构建产物
          if [ -d "$BUILD_DIR/bin" ]; then
            cp -r "$BUILD_DIR/bin/"* "$APP_DIR/usr/bin/"
          else
            cp -r "$BUILD_DIR/"* "$APP_DIR/usr/bin/"
          fi
          [ -d "$BUILD_DIR/lib"       ] && cp -r "$BUILD_DIR/lib/"*       "$APP_DIR/usr/lib/" || true
          [ -d "$BUILD_DIR/Resources" ] && cp -r "$BUILD_DIR/Resources"   "$APP_DIR/usr/"     || true

          # 打包 libudev + libusb（node-hid hidraw 后端依赖）
          for lib in \
            /usr/lib/x86_64-linux-gnu/libudev.so.1 \
            /lib/x86_64-linux-gnu/libudev.so.1 \
            /usr/lib/x86_64-linux-gnu/libusb-1.0.so.0 \
            /lib/x86_64-linux-gnu/libusb-1.0.so.0; do
            [ -f "$lib" ] && cp "$lib" "$APP_DIR/usr/lib/" && echo "Copied $lib"
          done

          # Desktop entry
          cat > "$APP_DIR/usr/share/applications/usb-device-viewer.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=USB Device Viewer
          Exec=USBDeviceViewer
          Icon=usb-device-viewer
          Type=Application
          Categories=Utility;
          DESKTOP

          cp icon.png "$APP_DIR/usr/share/icons/hicolor/256x256/apps/usb-device-viewer.png"
          cp icon.png "$APP_DIR/usb-device-viewer.png"
          cp "$APP_DIR/usr/share/applications/usb-device-viewer.desktop" "$APP_DIR/"
          sed -i 's|^Exec=.*|Exec=AppRun|' "$APP_DIR/usb-device-viewer.desktop"

          # AppRun
          cat > "$APP_DIR/AppRun" <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE="${SELF%/*}"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export APPDIR="$HERE"
          EXEC=$(ls "$HERE/usr/bin/" | grep -v '\.so' | grep -v '\.node' | head -1)
          exec "$HERE/usr/bin/$EXEC" "$@"
          EOF
          chmod +x "$APP_DIR/AppRun"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream "$APP_DIR" "USBDeviceViewer-${VERSION}-linux-x64.AppImage"

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: "*.AppImage"
          if-no-files-found: error
          retention-days: 30

      # ── Windows: Inno Setup installer ─────────────────────────────────────
      - name: Find build output dir (Windows)
        if: runner.os == 'Windows'
        id: builddir
        shell: pwsh
        run: |
          $dir = Get-ChildItem -Path build -Recurse -Directory | Where-Object { $_.Name -match "USBDeviceViewer" } | Select-Object -First 1
          echo "BUILD_DIR=$($dir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create Inno Setup script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $buildDir = "${{ steps.builddir.outputs.BUILD_DIR }}"
          $version  = "${{ steps.version.outputs.VERSION }}"
          $iss = @"
          [Setup]
          AppName=USB Device Viewer
          AppVersion=$version
          DefaultDirName={autopf}\USBDeviceViewer
          DefaultGroupName=USB Device Viewer
          OutputDir=installer
          OutputBaseFilename=USBDeviceViewer-$version-windows-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"
          Name: "{commondesktop}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\bin\USBDeviceViewer.exe"; Description: "Launch USB Device Viewer"; Flags: nowait postinstall skipifsilent
          "@
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          $iss | Out-File -FilePath "setup.iss" -Encoding UTF8

      - name: Build installer with Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: iscc setup.iss

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: installer/*.exe
          if-no-files-found: error
          retention-days: 30

      # ── macOS: DMG ────────────────────────────────────────────────────────
      - name: Copy libhidapi into app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          BUILD_DIR=$(find build -mindepth 2 -maxdepth 2 -type d | head -1)
          LIB_DIR="$BUILD_DIR/lib"
          mkdir -p "$LIB_DIR"
          for src in \
            /opt/homebrew/lib/libhidapi.dylib \
            /opt/homebrew/lib/libhidapi.0.dylib \
            /usr/local/lib/libhidapi.dylib; do
            [ -f "$src" ] && cp "$src" "$LIB_DIR/" && echo "Copied $src"
          done
          ls "$LIB_DIR"

      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_DIR=$(find build -mindepth 2 -maxdepth 2 -type d | head -1)

          mkdir -p dmg-source
          cp -r "$BUILD_DIR" dmg-source/

          create-dmg \
            --volname "USB Device Viewer $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "USBDeviceViewer-${VERSION}-macos-arm64.dmg" \
            dmg-source/

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: "*.dmg"
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
