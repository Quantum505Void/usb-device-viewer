name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos-arm64
          - os: macos-12
            platform: macos-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Linux: node-hid 需要 libudev + libhidapi
      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libhidapi-dev

      # Windows: node-hid 需要 node-gyp 编译环境
      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp
        shell: bash

      - name: Install dependencies
        run: bun install

      - name: Build renderer
        run: bun run vite:build

      - name: Build app
        run: bun run ./node_modules/.bin/electrobun build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: build/
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
