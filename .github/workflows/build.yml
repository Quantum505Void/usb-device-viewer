name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libhidapi-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp
        shell: bash

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd build
          zip -r "../usb-device-viewer-${{ matrix.platform }}.zip" . 2>/dev/null || tar czf "../usb-device-viewer-${{ matrix.platform }}.tar.gz" .
        shell: bash

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build\* -DestinationPath "usb-device-viewer-${{ matrix.platform }}.zip" -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: usb-device-viewer-${{ matrix.platform }}.*
          if-no-files-found: warn
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
