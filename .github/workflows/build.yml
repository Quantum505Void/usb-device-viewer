name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libhidapi-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp
        shell: bash

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # ── Windows: Inno Setup installer ──────────────────────────────────────
      - name: Get version
        if: runner.os == 'Windows'
        id: version
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Find build output dir (Windows)
        if: runner.os == 'Windows'
        id: builddir
        run: |
          $dir = Get-ChildItem -Path build -Directory | Select-Object -First 1
          echo "BUILD_DIR=$($dir.FullName)" >> $env:GITHUB_OUTPUT
          echo "APP_NAME=$($dir.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Inno Setup script
        if: runner.os == 'Windows'
        run: |
          $buildDir = "${{ steps.builddir.outputs.BUILD_DIR }}"
          $version  = "${{ steps.version.outputs.VERSION }}"
          $iss = @"
          [Setup]
          AppName=USB Device Viewer
          AppVersion=$version
          DefaultDirName={autopf}\USBDeviceViewer
          DefaultGroupName=USB Device Viewer
          OutputDir=installer
          OutputBaseFilename=USBDeviceViewer-$version-windows-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"
          Name: "{commondesktop}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\bin\USBDeviceViewer.exe"; Description: "Launch USB Device Viewer"; Flags: nowait postinstall skipifsilent
          "@
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          $iss | Out-File -FilePath "setup.iss" -Encoding UTF8
        shell: pwsh

      - name: Build installer with Inno Setup
        if: runner.os == 'Windows'
        run: iscc setup.iss
        shell: cmd

      - name: Upload installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: installer/*.exe
          if-no-files-found: error
          retention-days: 30

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar czf "usb-device-viewer-${{ matrix.platform }}.tar.gz" -C build .

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: usb-device-viewer-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 30

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: cd build && zip -r "../usb-device-viewer-${{ matrix.platform }}.zip" .

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: usb-device-viewer-${{ matrix.platform }}.zip
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
