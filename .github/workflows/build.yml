name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libhidapi-dev libwebkit2gtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libfuse2 desktop-file-utils

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp
        shell: bash

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # ── Windows: Inno Setup installer (.exe) ───────────────────────────────
      - name: Find build output dir (Windows)
        if: runner.os == 'Windows'
        id: builddir
        run: |
          $dir = Get-ChildItem -Path build -Directory | Select-Object -First 1
          echo "BUILD_DIR=$($dir.FullName)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Inno Setup script
        if: runner.os == 'Windows'
        run: |
          $buildDir = "${{ steps.builddir.outputs.BUILD_DIR }}"
          $version  = "${{ steps.version.outputs.VERSION }}"
          $iss = @"
          [Setup]
          AppName=USB Device Viewer
          AppVersion=$version
          DefaultDirName={autopf}\USBDeviceViewer
          DefaultGroupName=USB Device Viewer
          OutputDir=installer
          OutputBaseFilename=USBDeviceViewer-$version-windows-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"
          Name: "{commondesktop}\USB Device Viewer"; Filename: "{app}\bin\USBDeviceViewer.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\bin\USBDeviceViewer.exe"; Description: "Launch USB Device Viewer"; Flags: nowait postinstall skipifsilent
          "@
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          $iss | Out-File -FilePath "setup.iss" -Encoding UTF8
        shell: pwsh

      - name: Build installer with Inno Setup
        if: runner.os == 'Windows'
        run: iscc setup.iss
        shell: cmd

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: installer/*.exe
          if-no-files-found: error
          retention-days: 30

      # ── Linux: AppImage (single-file, runs on any distro) ─────────────────
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_DIR=$(find build -mindepth 1 -maxdepth 1 -type d | head -1)
          APP_DIR="USBDeviceViewer.AppDir"

          mkdir -p "$APP_DIR/usr/bin" "$APP_DIR/usr/lib" "$APP_DIR/usr/share/applications" "$APP_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy build output
          cp -r "$BUILD_DIR/bin/"* "$APP_DIR/usr/bin/"
          cp -r "$BUILD_DIR/lib/"* "$APP_DIR/usr/lib/" 2>/dev/null || true
          cp -r "$BUILD_DIR/Resources" "$APP_DIR/usr/" 2>/dev/null || true

          # Desktop entry
          cat > "$APP_DIR/usr/share/applications/usb-device-viewer.desktop" <<EOF
          [Desktop Entry]
          Name=USB Device Viewer
          Exec=USBDeviceViewer
          Icon=usb-device-viewer
          Type=Application
          Categories=Utility;
          EOF

          cp icon.png "$APP_DIR/usr/share/icons/hicolor/256x256/apps/usb-device-viewer.png"
          cp icon.png "$APP_DIR/usb-device-viewer.png"

          # AppRun entrypoint
          cat > "$APP_DIR/AppRun" <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE="${SELF%/*}"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/$(ls "$HERE/usr/bin/" | head -1)" "$@"
          EOF
          chmod +x "$APP_DIR/AppRun"

          # Desktop file at root
          cp "$APP_DIR/usr/share/applications/usb-device-viewer.desktop" "$APP_DIR/"
          sed -i 's|^Exec=.*|Exec=AppRun|' "$APP_DIR/usb-device-viewer.desktop"

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream "$APP_DIR" "USBDeviceViewer-${VERSION}-linux-x64.AppImage"

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: "*.AppImage"
          if-no-files-found: error
          retention-days: 30

      # ── macOS: DMG ────────────────────────────────────────────────────────
      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_DIR=$(find build -mindepth 1 -maxdepth 1 -type d | head -1)

          # create-dmg via brew
          brew install create-dmg

          mkdir -p dmg-source
          cp -r "$BUILD_DIR" dmg-source/

          create-dmg \
            --volname "USB Device Viewer $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "USBDeviceViewer-${VERSION}-macos-arm64.dmg" \
            dmg-source/

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: usb-device-viewer-${{ matrix.platform }}
          path: "*.dmg"
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
