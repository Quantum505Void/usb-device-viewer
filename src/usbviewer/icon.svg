<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- USB 图标设计 -->
  <defs>
    <linearGradient id="usbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#usbGradient)" stroke="#2C5F8D" stroke-width="3" />

  <!-- USB 符号主体 -->
  <!-- 中心圆 -->
  <circle cx="64" cy="90" r="8" fill="white" stroke="#2C5F8D" stroke-width="2" />

  <!-- 主干线 -->
  <line x1="64" y1="82" x2="64" y2="35" stroke="white" stroke-width="6" stroke-linecap="round" />

  <!-- 左分支 (圆形终端) -->
  <line x1="64" y1="45" x2="44" y2="30" stroke="white" stroke-width="5" stroke-linecap="round" />
  <circle cx="44" cy="30" r="5" fill="white" stroke="#2C5F8D" stroke-width="2" />

  <!-- 右分支 (箭头) -->
  <line x1="64" y1="45" x2="84" y2="30" stroke="white" stroke-width="5" stroke-linecap="round" />
  <polygon points="84,25 89,30 84,35" fill="white" stroke="#2C5F8D" stroke-width="2" />

  <!-- 顶部箭头 -->
  <polygon points="64,30 69,35 59,35" fill="white" stroke="#2C5F8D" stroke-width="2" />

  <!-- 装饰性细节 -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="white" stroke-width="1" opacity="0.3" />
</svg>