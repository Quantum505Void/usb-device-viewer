<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USB 设备查看器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Toast 容器 -->
  <div id="toast-container"></div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn btn-primary" id="btn-refresh" title="刷新设备列表">
        <span class="btn-icon">🔄</span>
        <span>刷新设备</span>
      </button>
      <div class="separator"></div>
      <button class="btn btn-secondary" id="btn-copy" title="复制选中设备信息">
        <span class="btn-icon">📋</span>
        <span>复制信息</span>
      </button>
      <button class="btn btn-secondary" id="btn-export" title="导出全部设备">
        <span class="btn-icon">💾</span>
        <span>导出数据</span>
      </button>
    </div>
    <div class="toolbar-right">
      <span class="monitor-label">🔍 自动监控:</span>
      <span class="monitor-status" id="monitor-status">● 运行中</span>
      <span class="sys-info" id="sys-info">💻 加载中...</span>
    </div>
  </div>

  <!-- 搜索 + 计数 -->
  <div class="search-bar">
    <input
      type="text"
      id="search-input"
      class="search-input"
      placeholder="🔍 搜索设备... (支持VID、PID、供应商、产品名称、序列号)"
    />
    <div class="device-count" id="device-count">📊 设备数: 0</div>
  </div>

  <!-- 设备列表 -->
  <div class="list-group">
    <div class="list-group-title">📋 设备列表</div>
    <div class="device-list" id="device-list">
      <div class="list-placeholder">⏳ 正在扫描设备，请稍候...</div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="statusbar">
    <span id="status-label">✅ 就绪</span>
    <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-inner" id="progress-inner"></div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title">设备详情</div>
          <div class="modal-vendor" id="modal-vendor"></div>
        </div>
        <button class="modal-close" id="modal-close">✖</button>
      </div>
      <div class="modal-body">
        <div class="info-group">
          <div class="info-group-title">🆔 识别信息</div>
          <div class="info-row"><span class="info-key">VID:</span><span id="m-vid" class="info-val"></span></div>
          <div class="info-row"><span class="info-key">PID:</span><span id="m-pid" class="info-val"></span></div>
          <div class="info-row"><span class="info-key">序列号:</span><span id="m-serial" class="info-val"></span></div>
        </div>
        <div class="info-group">
          <div class="info-group-title">📋 原始数据</div>
          <pre id="m-raw" class="raw-data"></pre>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modal-copy">📋 复制信息</button>
        <button class="btn btn-secondary" id="modal-close-btn">✖ 关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="./mainview.js"></script>
</body>
</html>
